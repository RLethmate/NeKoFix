name: Deploy to GitHub Pages

# US-56: Bei jedem Push auf main die Build-Version automatisch setzen (Commit-Hash + Datum)
# und die Seite über GitHub Actions deployen. Der Versions-Stempel landet zugleich in der
# Cache-Busting-Kennung der Skripte (index.html: var v="...") und in der Anzeige (view.js).
#
# Einmalige Einrichtung: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie, damit y = Commit-Anzahl korrekt ist
      - name: Version stempeln (v-<x>.<commits>.0, Cache-Hash, Build-Datum)
        run: |
          SHA="$(git rev-parse --short HEAD)"
          DATE="$(date +%Y-%m-%d)"
          MAJOR="$(sed -n 's/.*const APP_MAJOR=\"\([^\"]*\)\".*/\1/p' view.js)"
          Y="$(git rev-list --count HEAD)"   # y = Gesamtzahl der Commits (kein Reset)
          VERSION="v-${MAJOR}.${Y}.0"
          sed -i "s/const APP_VERSION=\"[^\"]*\"/const APP_VERSION=\"$VERSION\"/" view.js
          sed -i "s/var v=\"[^\"]*\"/var v=\"$SHA\"/" index.html
          sed -i "s/const BUILD_DATE=\"[^\"]*\"/const BUILD_DATE=\"$DATE\"/" view.js
          echo "Gestempelt: $VERSION · $DATE (Cache $SHA)"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
